<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible"
          content="ie=edge">
    <title>CSS backdrop-filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.11/vue.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
          rel="stylesheet">
    <style>
      html {
        font-family: 'Montserrat', sans-serif;
        background: #111;
      }

      main {
        max-width: 1024px;
        margin: 0 auto;
      }

      .img-container {
        margin: 0 auto;
        background-image: url('img.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: bottom;
        height: 1000px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .filter {
        height: 60%;
        width: 60%;
        border: 2px solid white;
      }

      .controls {
        margin-top: 2rem;
        color: white;
      }

      .control {
        margin-top: 5px;
      }

      .control label {
        text-transform: capitalize;
      }

      .code {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 2rem;
        padding: 1rem;
        border: 1px solid white;
      }

      .copy-icon {
        cursor: pointer;
        margin-left: 2rem;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <h1 style="color: white;">CSS backdrop-filter</h1>
      <div class="img-container">
        <div class="filter"
             :style="{'backdrop-filter': backdropFilter}"></div>
      </div>

      <div class="controls">
        <div v-for="control in controls">
          <div class="control">
            <label :for="control.name">{{control.name}}</label>
            <input v-model="properties[control.name]"
                   :id="control.name"
                   type="range"
                   :min="control.min"
                   :max="control.max">
            <button @click="properties[control.name]--"
                    :disabled="properties[control.name]<=control.min">-
            </button>
            <button @click="properties[control.name]++"
                    :disabled="properties[control.name]>=control.max">+
            </button>
            <span>{{properties[control.name]}}{{control.unit}}</span>
          </div>
        </div>
      </div>

      <div class="code">
        <code style="color: white;">backdrop-filter: {{backdropFilter}}</code>
        <span class="copy-icon">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="icon icon-tabler icon-tabler-copy"
               width="44"
               height="44"
               viewBox="0 0 24 24"
               stroke-width="1.5"
               stroke="#fff"
               fill="none"
               stroke-linecap="round"
               stroke-linejoin="round">
            <path stroke="none"
                  d="M0 0h24v24H0z"/>
            <rect x="8"
                  y="8"
                  width="12"
                  height="12"
                  rx="2"/>
            <path d="M16 8v-2a2 2 0 0 0 -2 -2h-8a2 2 0 0 0 -2 2v8a2 2 0 0 0 2 2h2"/>
          </svg>
        </span>
      </div>
    </main>

    <script>
      let app = new Vue({
        el: '#main',

        computed: {
          controls () {
            return [
              {
                name: 'blur',
                unit: 'px',
                min: 0,
                max: 50,
                default: 0
              },
              {
                name: 'brightness',
                unit: '%',
                min: 0,
                max: 200,
                default: 100
              },
              {
                name: 'contrast',
                unit: '%',
                min: 0,
                max: 300,
                default: 100
              },
              {
                name: 'grayscale',
                unit: '%',
                min: 0,
                max: 100,
                default: 0
              },
              {
                name: 'hue-rotate',
                unit: 'deg',
                min: 0,
                max: 360,
                default: 0
              },
              {
                name: 'invert',
                unit: '%',
                min: 0,
                max: 100,
                default: 0
              },
              {
                name: 'opacity',
                unit: '%',
                min: 0,
                max: 100,
                default: 100
              },
              {
                name: 'sepia',
                unit: '%',
                min: 0,
                max: 100,
                default: 0
              },
              {
                name: 'saturate',
                unit: '%',
                min: 0,
                max: 100,
                default: 100
              }
            ]
          },

          backdropFilter () {
            return this.controls
                .filter(control => this.properties[control.name] !== control.default)
                .reduce((acc, control) => acc + ` ${control.name}(${this.properties[control.name]}${control.unit})`, '')
              || 'none'
          }
        },

        data: {
          properties: {}
        },

        methods: {
          reset () {
            this.controls.forEach(control => {
              Vue.set(this.properties, control.name, control.default)
            })
          }
        },

        mounted () {
          this.reset()
        }
      })
    </script>
  </body>
</html>
